<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Presentación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            background: white;
            width: 80%;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #0077cc;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            background: #0077cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Dr. Valentín Basel</h1>

        <p>Este es un texto de ejemplo donde podés explicar de qué trata tu presentación.</p>

        <!-- Imagen -->
        <img src="img/valentin.jpg" alt="Foto de Valentín Basel">

        <p>Podés agregar más texto explicativo acá.</p>

        <!-- Enlaces -->
        <div class="links">
            <a href="https://www.ejemplo1.com" target="_blank">Enlace 1</a>
            <a href="https://www.ejemplo2.com" target="_blank">Enlace 2</a>
            <a href="https://www.ejemplo3.com" target="_blank">Enlace 3</a>
        </div>
    </div>

</body>
</html>
